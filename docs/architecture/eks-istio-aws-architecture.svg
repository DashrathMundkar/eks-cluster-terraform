<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">EKS + Istio on AWS Architecture</title>
  <desc id="desc">Terraform-provisioned AWS VPC and EKS cluster with Istio ingress and NGINX application traffic flow.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="awsCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="k8sCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#475569"/>
    </marker>
    <style>
      .title  { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #334155; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label  { font: 600 14px Arial, sans-serif; fill: #1e293b; }
      .small  { font: 500 12px Arial, sans-serif; fill: #334155; }
      .tiny   { font: 500 11px Arial, sans-serif; fill: #475569; }
      .flow   { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .flow-dashed { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .card   { rx: 14; ry: 14; }
      .shadow { filter: drop-shadow(0 3px 5px rgba(15,23,42,0.14)); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>

  <!-- Title -->
  <text x="56" y="58" class="title">AWS EKS + Istio Architecture (Terraform Managed)</text>
  <text x="56" y="86" class="subtitle">eu-central-1 · VPC + EKS + Istio + NGINX · Source: terraform/*.tf and k8s/*.yaml</text>

  <!-- ──────────────────────────────────────────────
       LEFT COLUMN: Ingress Sources + Provisioning
       ────────────────────────────────────────────── -->
  <rect x="36" y="128" width="264" height="200" class="card shadow" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="162" class="section">Ingress Sources</text>
  <rect x="58" y="176" width="220" height="56" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="74" y="200" class="label">👤  Client / Browser</text>
  <text x="74" y="218" class="tiny">HTTP/HTTPS request</text>
  <rect x="58" y="246" width="220" height="56" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="74" y="270" class="label">🌐  DNS</text>
  <text x="74" y="288" class="tiny">Routes domain to NLB hostname</text>

  <rect x="36" y="356" width="264" height="200" class="card shadow" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="390" class="section">Provisioning</text>
  <rect x="58" y="406" width="220" height="60" class="card" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="74" y="430" class="label">⚙️  Terraform Root Module</text>
  <text x="74" y="448" class="tiny">terraform/providers.tf · vpc.tf · eks.tf</text>
  <rect x="58" y="478" width="220" height="60" class="card" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="74" y="502" class="label">☁️  AWS APIs</text>
  <text x="74" y="520" class="tiny">VPC · IAM · EKS control plane</text>

  <!-- ──────────────────────────────────────────────
       AWS ACCOUNT BOUNDARY
       ────────────────────────────────────────────── -->
  <rect x="338" y="110" width="1224" height="830" rx="22" ry="22" fill="#ffffff" stroke="#f59e0b" stroke-width="2.4"/>
  <text x="362" y="148" class="section">☁  AWS Account</text>
  <text x="490" y="148" class="small">(eu-central-1)</text>

  <!-- ──────────────────────────────────────────────
       VPC BOUNDARY
       ────────────────────────────────────────────── -->
  <rect x="364" y="172" width="1178" height="744" rx="18" ry="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="386" y="206" class="section">VPC — aws_vpc.eks_vpc</text>
  <text x="580" y="206" class="small">CIDR: var.vpc_cidr_range · DNS hostnames + support enabled</text>

  <!-- Internet Edge -->
  <rect x="388" y="230" width="372" height="164" class="card shadow" fill="url(#awsCard)" stroke="#f59e0b"/>
  <text x="410" y="260" class="label">Internet Edge</text>
  <rect x="410" y="274" width="156" height="96" class="card" fill="#ffffff" stroke="#f59e0b"/>
  <text x="426" y="302" class="small">🔗  Internet Gateway</text>
  <text x="426" y="322" class="tiny">aws_internet_gateway.this</text>
  <text x="426" y="340" class="tiny">attached to eks_vpc</text>
  <rect x="584" y="274" width="156" height="96" class="card" fill="#ffffff" stroke="#f59e0b"/>
  <text x="600" y="302" class="small">📤  NAT Gateway</text>
  <text x="600" y="322" class="tiny">aws_nat_gateway.this</text>
  <text x="600" y="340" class="tiny">EIP: aws_eip.nat</text>

  <!-- Public Subnets -->
  <rect x="388" y="420" width="560" height="222" class="card shadow" fill="#ffffff" stroke="#fb923c"/>
  <text x="410" y="450" class="label">Public Subnets × 2</text>
  <text x="570" y="450" class="tiny">map_public_ip_on_launch = true</text>
  <rect x="410" y="466" width="252" height="92" class="card" fill="#fff7ed" stroke="#fdba74"/>
  <text x="426" y="494" class="small">public_subnet[0]</text>
  <text x="426" y="512" class="tiny">AZ: eu-central-1a</text>
  <text x="426" y="530" class="tiny">tag: kubernetes.io/role/elb = 1</text>
  <rect x="676" y="466" width="252" height="92" class="card" fill="#fff7ed" stroke="#fdba74"/>
  <text x="692" y="494" class="small">public_subnet[1]</text>
  <text x="692" y="512" class="tiny">AZ: eu-central-1b</text>
  <text x="692" y="530" class="tiny">tag: kubernetes.io/role/elb = 1</text>
  <rect x="410" y="568" width="518" height="56" class="card" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="426" y="601" class="small">Public Route Table — 0.0.0.0/0 → Internet Gateway</text>

  <!-- Private Subnets -->
  <rect x="388" y="664" width="560" height="222" class="card shadow" fill="#ffffff" stroke="#fb923c"/>
  <text x="410" y="694" class="label">Private Subnets × 2</text>
  <text x="560" y="694" class="tiny">EKS Node Group target subnets</text>
  <rect x="410" y="710" width="252" height="92" class="card" fill="#fff7ed" stroke="#fdba74"/>
  <text x="426" y="738" class="small">private_subnet[0]</text>
  <text x="426" y="756" class="tiny">AZ: eu-central-1a</text>
  <text x="426" y="774" class="tiny">tag: kubernetes.io/role/internal-elb = 1</text>
  <rect x="676" y="710" width="252" height="92" class="card" fill="#fff7ed" stroke="#fdba74"/>
  <text x="692" y="738" class="small">private_subnet[1]</text>
  <text x="692" y="756" class="tiny">AZ: eu-central-1b</text>
  <text x="692" y="774" class="tiny">tag: kubernetes.io/role/internal-elb = 1</text>
  <rect x="410" y="812" width="518" height="56" class="card" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="426" y="845" class="small">Private Route Table — 0.0.0.0/0 → NAT Gateway</text>

  <!-- Security Group -->
  <rect x="388" y="894" width="560" height="56" class="card" fill="#fef9c3" stroke="#facc15"/>
  <text x="410" y="924" class="small">Security Group — aws_security_group.eks_cluster (egress 0.0.0.0/0 all)</text>

  <!-- ──────────────────────────────────────────────
       EKS PLATFORM
       ────────────────────────────────────────────── -->
  <rect x="980" y="230" width="538" height="686" class="card shadow" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="1002" y="264" class="label">☸  EKS Platform</text>
  <text x="1128" y="264" class="tiny">aws_eks_cluster.eks_cluster</text>

  <!-- Control Plane -->
  <rect x="1002" y="278" width="494" height="122" class="card" fill="url(#k8sCard)" stroke="#60a5fa"/>
  <text x="1020" y="306" class="small">Control Plane</text>
  <text x="1020" y="326" class="tiny">version: var.cluster_version (1.33)</text>
  <text x="1020" y="344" class="tiny">subnet_ids: private_subnet[*] + public_subnet[*]</text>
  <text x="1020" y="362" class="tiny">IAM: aws_iam_role.cluster + AmazonEKSClusterPolicy</text>

  <!-- Node Group -->
  <rect x="1002" y="418" width="494" height="130" class="card" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="1020" y="446" class="small">Managed Node Group — application-node-group</text>
  <text x="1020" y="466" class="tiny">desired_size=1 · min_size=1 · max_size=2</text>
  <text x="1020" y="486" class="tiny">subnet_ids: private_subnet[*]</text>
  <text x="1020" y="506" class="tiny">IAM: node_role + WorkerNode + CNI + ECR ReadOnly</text>

  <!-- K8s Workloads -->
  <rect x="1002" y="566" width="494" height="330" class="card" fill="#f8fbff" stroke="#93c5fd"/>
  <text x="1020" y="596" class="small">Kubernetes Workloads</text>

  <rect x="1022" y="612" width="220" height="96" class="card" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1038" y="638" class="tiny">istio-ingressgateway</text>
  <text x="1038" y="657" class="tiny">type: LoadBalancer (NLB)</text>
  <text x="1038" y="676" class="tiny">ns: istio-system</text>
  <text x="1038" y="695" class="tiny">port 80 → targetPort 80</text>

  <rect x="1258" y="612" width="220" height="96" class="card" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1274" y="638" class="tiny">Istio Gateway</text>
  <text x="1274" y="657" class="tiny">host: your-domain.com</text>
  <text x="1274" y="676" class="tiny">port: 80 HTTP</text>
  <text x="1274" y="695" class="tiny">ns: istio-system</text>

  <rect x="1022" y="724" width="220" height="96" class="card" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1038" y="750" class="tiny">VirtualService</text>
  <text x="1038" y="769" class="tiny">prefix /myapp → rewrite /</text>
  <text x="1038" y="788" class="tiny">→ nginx.nginx.svc:80</text>
  <text x="1038" y="807" class="tiny">ns: istio-system</text>

  <rect x="1258" y="724" width="220" height="96" class="card" fill="#ffffff" stroke="#93c5fd"/>
  <text x="1274" y="750" class="tiny">NGINX Deployment + Service</text>
  <text x="1274" y="769" class="tiny">replicas: 1</text>
  <text x="1274" y="788" class="tiny">image: nginx</text>
  <text x="1274" y="807" class="tiny">ns: nginx · port 80</text>

  <!-- ──────────────────────────────────────────────
       FLOW ARROWS
       ────────────────────────────────────────────── -->

  <!-- Client → DNS -->
  <path d="M168 246 L168 246" class="flow"/>
  <line x1="168" y1="232" x2="168" y2="246" class="flow"/>

  <!-- DNS → NLB (big request flow) -->
  <path d="M300 274 C320 274 334 274 338 274" class="flow"/>
  <path d="M338 274 C600 274 850 640 1022 656" class="flow"/>
  <text x="480" y="258" class="small" fill="#1e293b">HTTP/HTTPS request</text>

  <!-- Terraform → AWS boundary -->
  <path d="M300 436 C320 436 330 436 338 436" class="flow"/>
  <text x="304" y="428" class="tiny">terraform apply</text>
  <path d="M300 508 C320 508 330 508 338 508" class="flow"/>
  <text x="310" y="500" class="tiny">AWS API calls</text>

  <!-- IGW ↔ NAT vertical -->
  <line x1="662" y1="322" x2="662" y2="322" class="flow-dashed"/>

  <!-- Public subnets → public RT -->
  <path d="M536 558 L536 568" class="flow-dashed"/>
  <path d="M802 558 L802 568" class="flow-dashed"/>

  <!-- NAT → Private RT -->
  <path d="M662" y1="370 L662 420" class="flow-dashed"/>
  <path d="M662 420 C662 600 668 808 668 812" class="flow-dashed"/>
  <text x="674" y="620" class="tiny">0.0.0.0/0 via NAT</text>

  <!-- Private subnets → EKS Node Group -->
  <path d="M948 754 C966 754 978 490 980 490" class="flow-dashed"/>
  <text x="950" y="640" class="tiny">nodes in private subnets</text>

  <!-- NLB → Gateway -->
  <line x1="1242" y1="656" x2="1258" y2="656" class="flow"/>

  <!-- Gateway → VirtualService -->
  <path d="M1368 708 L1368 724" class="flow"/>

  <!-- VirtualService → NGINX -->
  <line x1="1242" y1="769" x2="1258" y2="769" class="flow"/>

  <!-- ──────────────────────────────────────────────
       LEGEND
       ────────────────────────────────────────────── -->
  <rect x="36" y="588" width="264" height="200" class="card" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="618" class="section">Legend</text>
  <rect x="58" y="634" width="18" height="18" fill="#ffedd5" stroke="#f59e0b"/>
  <text x="84" y="648" class="tiny">AWS networking (VPC, subnets, IGW, NAT)</text>
  <rect x="58" y="662" width="18" height="18" fill="#dbeafe" stroke="#2563eb"/>
  <text x="84" y="676" class="tiny">EKS / Kubernetes components</text>
  <line x1="58" y1="703" x2="76" y2="703" class="flow"/>
  <text x="84" y="707" class="tiny">Live request / data flow</text>
  <line x1="58" y1="731" x2="76" y2="731" class="flow-dashed"/>
  <text x="84" y="735" class="tiny">Provisioning / association</text>
  <rect x="58" y="748" width="18" height="18" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="84" y="762" class="tiny">Terraform managed</text>
  <text x="58" y="778" class="tiny">Generated: docs/architecture/</text>
</svg>

